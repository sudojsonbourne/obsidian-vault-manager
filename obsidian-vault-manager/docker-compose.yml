services:
  obsidian-sync-audrey:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-audrey
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - /volume1/obsidian/audrey-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD}
      - VAULT_NAME=${AUDREY_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  obsidian-sync-taylor:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-taylor
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - /volume1/obsidian/taylor-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD}
      - VAULT_NAME=${TAYLOR_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  mcp-audrey:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-audrey
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 256m
    cpus: 0.25
    volumes:
      - /volume1/obsidian/audrey-vault:/vault
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - VAULT_PATH=/vault
      - PORT=3001
    depends_on:
      obsidian-sync-audrey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-taylor:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-taylor
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 256m
    cpus: 0.25
    volumes:
      - /volume1/obsidian/taylor-vault:/vault
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - VAULT_PATH=/vault
      - PORT=3002
    depends_on:
      obsidian-sync-taylor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    container_name: obsidian-cloudflared
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    command: tunnel --metrics localhost:2000 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      mcp-audrey:
        condition: service_healthy
      mcp-taylor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
