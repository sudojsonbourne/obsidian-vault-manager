services:
  obsidian-sync-audrey:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-audrey
    restart: unless-stopped
    volumes:
      - /volume1/obsidian/audrey-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL_AUDREY}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD_AUDREY}
      - VAULT_NAME=${AUDREY_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${AUDREY_ENCRYPTION_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  obsidian-sync-taylor:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-taylor
    restart: unless-stopped
    volumes:
      - /volume1/obsidian/taylor-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL_TAYLOR}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD_TAYLOR}
      - VAULT_NAME=${TAYLOR_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${TAYLOR_ENCRYPTION_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mcp-audrey:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-audrey
    restart: unless-stopped
    volumes:
      - /volume1/obsidian:/vaults
    ports:
      - "3001:3001"
    environment:
      - VAULT_PATH=/vaults/audrey-vault
      - PORT=3001
    depends_on:
      obsidian-sync-audrey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-taylor:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-taylor
    restart: unless-stopped
    volumes:
      - /volume1/obsidian:/vaults
    ports:
      - "3002:3002"
    environment:
      - VAULT_PATH=/vaults/taylor-vault
      - PORT=3002
    depends_on:
      obsidian-sync-taylor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: obsidian-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      mcp-audrey:
        condition: service_healthy
      mcp-taylor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
