services:
  obsidian-sync-audrey:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-audrey
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 512m
    stop_grace_period: 30s
    tmpfs:
      - /home/obsidian:uid=1026,gid=100
    volumes:
      - /volume1/obsidian/audrey-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD}
      - VAULT_NAME=${AUDREY_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  obsidian-sync-taylor:
    build:
      context: ./obsidian-sync
    container_name: obsidian-sync-taylor
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 512m
    stop_grace_period: 30s
    tmpfs:
      - /home/obsidian:uid=1026,gid=100
    volumes:
      - /volume1/obsidian/taylor-vault:/vault
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD}
      - VAULT_NAME=${TAYLOR_VAULT_NAME}
      - VAULT_PATH=/vault
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
      - STARTUP_DELAY=15
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ob sync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  mcp-audrey:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-audrey
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 256m
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /volume1/obsidian/audrey-vault:/vault
    environment:
      - VAULT_PATH=/vault
      - PORT=3001
    depends_on:
      obsidian-sync-audrey:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-taylor:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-taylor
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 256m
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /volume1/obsidian/taylor-vault:/vault
    environment:
      - VAULT_PATH=/vault
      - PORT=3002
    depends_on:
      obsidian-sync-taylor:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-proxy:
    build:
      context: ./auth-proxy
    container_name: obsidian-auth-proxy
    restart: unless-stopped
    user: "1026:100"
    mem_limit: 128m
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /volume1/obsidian/auth-data:/data
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - AUDREY_CLIENT_ID=${AUDREY_CLIENT_ID}
      - AUDREY_CLIENT_SECRET=${AUDREY_CLIENT_SECRET}
      - TAYLOR_CLIENT_ID=${TAYLOR_CLIENT_ID}
      - TAYLOR_CLIENT_SECRET=${TAYLOR_CLIENT_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUDREY_PUBLIC_URL=${AUDREY_PUBLIC_URL}
      - TAYLOR_PUBLIC_URL=${TAYLOR_PUBLIC_URL}
      - AUDREY_BACKEND=http://mcp-audrey:3001
      - TAYLOR_BACKEND=http://mcp-taylor:3002
    depends_on:
      mcp-audrey:
        condition: service_healthy
      mcp-taylor:
        condition: service_healthy
    networks:
      - default
      - tunnel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tunnel-net:
    external: true
