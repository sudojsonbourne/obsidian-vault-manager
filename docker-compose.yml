services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: obsidian-syncthing
    restart: unless-stopped
    environment:
      - PUID=1026
      - PGID=100
    volumes:
      - /volume1/obsidian:/var/syncthing/obsidian
      - syncthing-config:/var/syncthing/config
    ports:
      - "8384:8384"   # Web UI
      - "22000:22000/tcp" # Sync protocol
      - "22000:22000/udp"
      - "21027:21027/udp" # Discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8384/rest/noauth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-audrey:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-audrey
    restart: unless-stopped
    volumes:
      - /volume1/obsidian:/vaults
    ports:
      - "3001:3001"
    environment:
      - VAULT_PATH=/vaults/audrey-vault
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-taylor:
    build:
      context: ./mcp-server
    container_name: obsidian-mcp-taylor
    restart: unless-stopped
    volumes:
      - /volume1/obsidian:/vaults
    ports:
      - "3002:3002"
    environment:
      - VAULT_PATH=/vaults/taylor-vault
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: obsidian-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      mcp-audrey:
        condition: service_healthy
      mcp-taylor:
        condition: service_healthy

volumes:
  syncthing-config:
