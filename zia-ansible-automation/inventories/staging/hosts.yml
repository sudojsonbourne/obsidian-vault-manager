# =============================================================================
# inventories/staging/hosts.yml — Staging Inventory
# =============================================================================
# PURPOSE:
#   Defines the Ansible inventory for the ZIA staging/test environment.
#   Used for validating changes before promoting to production.
#
# STAGING PHILOSOPHY:
#   - Staging mirrors production structure but uses a separate ZIA tenant
#   - All changes MUST be validated in staging before production
#   - Staging has relaxed safety controls (no confirmation prompts in CI/CD)
#   - Staging uses a separate Vault path for credentials
#
# USAGE:
#   ansible-playbook -i inventories/staging site.yml
#   ansible-playbook -i inventories/staging onboard_locations.yml --check
#
# CI/CD PIPELINE FLOW:
#   1. PR opened → run against staging (make validate INVENTORY=inventories/staging)
#   2. PR approved → apply to staging (make apply INVENTORY=inventories/staging)
#   3. Staging validated → promote to production (make apply)
# =============================================================================

---
all:
  children:
    zia_tenants:
      vars:
        # All ZIA automation runs locally (API calls from control node)
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

      children:
        zia_staging_tenants:
          hosts:

            # Staging ZIA tenant — mirrors production structure
            # Uses ZIA Beta cloud for safe testing
            zia_tenant_staging:
              # Use zscalerbeta or zspreview for staging
              zia_cloud: "zscalerbeta"

              # Separate Vault path for staging credentials
              vault_zia_path: "secret/zia/staging/credentials"

              zia_tenant_description: "Staging ZIA Tenant - Pre-Production Testing"

              # Staging uses a smaller set of test locations
              zia_locations_file: "vars/locations/bulk_locations_staging.yml"
              zia_gre_tunnels_file: "vars/locations/gre_tunnels_staging.yml"
