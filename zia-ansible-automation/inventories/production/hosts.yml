# =============================================================================
# inventories/production/hosts.yml — Production Inventory
# =============================================================================
# PURPOSE:
#   Defines the Ansible inventory for the ZIA production environment.
#
# DESIGN PHILOSOPHY:
#   ZIA is a cloud-based SaaS platform — there are no traditional SSH hosts.
#   Instead, we use 'localhost' as the Ansible control node, which makes
#   API calls to the ZIA cloud on behalf of each logical "host" (tenant).
#
#   This pattern is standard for API-driven automation:
#   - Each ZIA tenant is represented as a logical host
#   - connection: local means Ansible runs tasks on the control node
#   - The ZIA API credentials are passed as variables per host/group
#
# MULTI-TENANT SUPPORT:
#   This inventory supports multiple ZIA tenants (cloud environments).
#   Each tenant maps to a different ZIA cloud instance with its own:
#   - API endpoint (zia_cloud)
#   - Credentials (retrieved from Vault per tenant)
#   - Location definitions
#
# SCALING:
#   For 100+ locations, the locations themselves are NOT inventory hosts.
#   Locations are data (defined in vars/locations/bulk_locations.yml).
#   The inventory only defines ZIA tenants/environments.
#
# USAGE:
#   ansible-playbook -i inventories/production site.yml
#   ansible-playbook -i inventories/production site.yml --limit zia_tenant_primary
#
# ADDING A NEW TENANT:
#   1. Add the tenant host under the appropriate group
#   2. Set zia_cloud to the correct ZIA cloud name
#   3. Set vault_zia_path to the Vault secret path for this tenant
#   4. Create corresponding group_vars if needed
# =============================================================================

---
all:
  # ---------------------------------------------------------------------------
  # CHILDREN GROUPS
  # ---------------------------------------------------------------------------
  # Organize tenants by environment and region for targeted execution.
  # This allows: ansible-playbook site.yml --limit zia_us_tenants
  children:

    # -------------------------------------------------------------------------
    # ZIA TENANTS — ALL
    # -------------------------------------------------------------------------
    # Top-level group containing all ZIA tenant connections.
    # Variables set here apply to ALL tenants unless overridden.
    zia_tenants:
      vars:
        # All ZIA automation runs locally (API calls from control node)
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

        # Default ZIA API settings (overridden per tenant if needed)
        zia_sandbox_submission: false

      children:

        # -----------------------------------------------------------------------
        # US TENANTS
        # -----------------------------------------------------------------------
        zia_us_tenants:
          hosts:

            # Primary US ZIA tenant
            # This represents your main ZIA cloud instance for US operations
            zia_tenant_us_primary:
              # ZIA cloud name — determines the API endpoint
              # Common values: zscaler, zscloud, zscalertwo, zscalerthree,
              #                zscalerbeta, zspreview
              # Find yours at: https://admin.zscaler.net (check URL)
              zia_cloud: "zscaler"

              # Vault path where ZIA credentials are stored for this tenant
              # Structure: secret/zia/<tenant_name>/credentials
              # Keys expected: api_key, username, password
              vault_zia_path: "secret/zia/us_primary/credentials"

              # Human-readable tenant description (used in logs and reports)
              zia_tenant_description: "US Primary ZIA Tenant - Production"

              # Location data file for this tenant
              # Points to the bulk locations file for this tenant
              zia_locations_file: "vars/locations/bulk_locations.yml"

              # GRE tunnel data file for this tenant
              zia_gre_tunnels_file: "vars/locations/gre_tunnels.yml"

            # Secondary US ZIA tenant (e.g., for a subsidiary or acquired company)
            zia_tenant_us_secondary:
              zia_cloud: "zscloud"
              vault_zia_path: "secret/zia/us_secondary/credentials"
              zia_tenant_description: "US Secondary ZIA Tenant - Subsidiary"
              zia_locations_file: "vars/locations/bulk_locations_secondary.yml"
              zia_gre_tunnels_file: "vars/locations/gre_tunnels_secondary.yml"

        # -----------------------------------------------------------------------
        # EU TENANTS
        # -----------------------------------------------------------------------
        zia_eu_tenants:
          hosts:

            # EU ZIA tenant (GDPR-compliant data residency)
            zia_tenant_eu_primary:
              zia_cloud: "zscalertwo"
              vault_zia_path: "secret/zia/eu_primary/credentials"
              zia_tenant_description: "EU Primary ZIA Tenant - GDPR Compliant"
              zia_locations_file: "vars/locations/bulk_locations_eu.yml"
              zia_gre_tunnels_file: "vars/locations/gre_tunnels_eu.yml"

        # -----------------------------------------------------------------------
        # APAC TENANTS
        # -----------------------------------------------------------------------
        zia_apac_tenants:
          hosts:

            # APAC ZIA tenant
            zia_tenant_apac_primary:
              zia_cloud: "zscalerthree"
              vault_zia_path: "secret/zia/apac_primary/credentials"
              zia_tenant_description: "APAC Primary ZIA Tenant"
              zia_locations_file: "vars/locations/bulk_locations_apac.yml"
              zia_gre_tunnels_file: "vars/locations/gre_tunnels_apac.yml"
