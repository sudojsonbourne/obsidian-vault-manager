# =============================================================================
# molecule/default/verify.yml — Molecule Verification Playbook
# =============================================================================
# PURPOSE:
#   Verifies that the role produced the expected outcomes.
#   Runs after converge to assert the desired state was achieved.
# =============================================================================

---
- name: "Molecule Verify — ZIA Role Assertions"
  hosts: all
  gather_facts: false

  tasks:
    - name: "VERIFY | Assert location name pattern validation works"
      ansible.builtin.assert:
        that:
          # Valid names should match the pattern
          - "'NYC-HQ-01' | regex_search('^[A-Z]{2,4}-[A-Z0-9-]+-[0-9]{2}$') is not none"
          - "'LAX-BRANCH-01' | regex_search('^[A-Z]{2,4}-[A-Z0-9-]+-[0-9]{2}$') is not none"
        success_msg: "✅ Location name pattern validation works correctly"

    - name: "VERIFY | Assert invalid location names are rejected"
      ansible.builtin.assert:
        that:
          # Invalid names should NOT match
          - "'invalid name' | regex_search('^[A-Z]{2,4}-[A-Z0-9-]+-[0-9]{2}$') is none"
          - "'lowercase-01' | regex_search('^[A-Z]{2,4}-[A-Z0-9-]+-[0-9]{2}$') is none"
        success_msg: "✅ Invalid location names correctly rejected"

    - name: "VERIFY | Assert FQDN validation logic is correct"
      ansible.builtin.assert:
        that:
          # Valid FQDNs
          - "'evil.com' | regex_search('^[a-zA-Z0-9]') is not none"
          - "'malware.evil.com' | regex_search('^[a-zA-Z0-9]') is not none"
        success_msg: "✅ FQDN validation logic works correctly"

    - name: "VERIFY | Assert safety defaults are set correctly"
      ansible.builtin.assert:
        that:
          - force | default(false) == false
          - zia_auto_activate | default(true) == false  # Disabled in test
          - max_bulk_delete | default(5) == 5
        success_msg: "✅ Safety defaults are correctly configured"

    - name: "VERIFY | Print verification complete"
      ansible.builtin.debug:
        msg: "✅ All Molecule verifications passed!"
