# =============================================================================
# molecule/default/converge.yml — Molecule Converge Playbook
# =============================================================================
# PURPOSE:
#   The converge playbook applies the role under test with test variables.
#   Uses mock/stub variables to test validation logic without real ZIA API calls.
#
# WHAT IS TESTED:
#   - Variable loading and defaults
#   - Validation task logic (assert conditions)
#   - Task structure and syntax
#   - Check mode behavior
#   - Error message quality
# =============================================================================

---
- name: "Molecule Converge — ZIA Location Role Test"
  hosts: all
  gather_facts: true

  vars:
    # Override Vault auth for testing — use mock credentials
    # In real CI/CD, these come from a test Vault instance
    zia_username: "test-admin@corp.example.com"
    zia_password: "test-password-molecule"
    zia_api_key: "test-api-key-molecule"
    zia_cloud: "zscaler"

    # Disable Vault lookup for unit tests
    # (Vault auth is tested separately in integration tests)
    skip_vault_auth: true

    # Test location data — valid locations for positive tests
    zia_locations:
      - name: "NYC-HQ-01"
        state: present
        country: "UNITED_STATES"
        tz: "US/Eastern"
        ip_addresses:
          - "203.0.113.10"
        profile: "CORPORATE"
        auth_required: true
        ssl_scan_enabled: false
        up_bandwidth: 0
        dn_bandwidth: 0
        description: "Molecule test location"
        tags:
          - "us-east"
          - "test"

      - name: "LAX-BRANCH-01"
        state: present
        country: "UNITED_STATES"
        tz: "US/Pacific"
        ip_addresses:
          - "203.0.113.20"
        profile: "CORPORATE"
        auth_required: true
        ssl_scan_enabled: false
        up_bandwidth: 100
        dn_bandwidth: 500
        description: "Molecule test location 2"
        tags:
          - "us-west"
          - "test"

    # Test GRE tunnel data
    zia_gre_tunnels:
      - source_ip: "203.0.113.10"
        location_name: "NYC-HQ-01"
        state: present
        within_country: false
        ip_unnumbered: false
        comment: "Molecule test GRE tunnel"

    # Test domain data
    malicious_domains:
      - "molecule-test-evil.com"
      - "molecule-test-malware.net"
      - "*.molecule-test-phishing.org"

    # Safety settings for tests
    force: false
    zia_auto_activate: false  # Don't activate in tests
    validate_location_names: true
    validate_ip_addresses: true
    location_name_pattern: "^[A-Z]{2,4}-[A-Z0-9-]+-[0-9]{2}$"
    location_name_max_length: 64
    max_bulk_delete: 5
    soft_delete_enabled: false  # Skip soft-delete in tests

  tasks:
    - name: "CONVERGE | Test location validation (should pass)"
      ansible.builtin.include_role:
        name: zscaler_zia_locations
        tasks_from: validate.yml
      tags:
        - validate

    - name: "CONVERGE | Test GRE tunnel validation (should pass)"
      ansible.builtin.include_role:
        name: zscaler_zia_gre_tunnels
        tasks_from: validate.yml
      tags:
        - validate

    - name: "CONVERGE | Test domain validation (should pass)"
      ansible.builtin.set_fact:
        all_domains_to_block: "{{ malicious_domains }}"

    - name: "CONVERGE | Run domain FQDN validation"
      ansible.builtin.include_role:
        name: zscaler_zia_domain_blocking
        tasks_from: validate.yml
      tags:
        - validate
