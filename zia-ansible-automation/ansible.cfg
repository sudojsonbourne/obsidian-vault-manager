# =============================================================================
# ansible.cfg — Ansible Configuration for ZIA Automation Framework
# =============================================================================
# PURPOSE:
#   This configuration file controls all Ansible runtime behavior for the
#   ZIA automation project. It is intentionally verbose and well-commented
#   to serve as a reference for operators and CI/CD pipeline engineers.
#
# ENTERPRISE CONSIDERATIONS:
#   - Logging is enabled to a dedicated log file for audit trails
#   - Retry files are stored in a dedicated directory (not cluttering project root)
#   - SSH pipelining is enabled for performance at scale (100+ locations)
#   - Fact caching is enabled to reduce API calls during large runs
#   - Callback plugins provide structured output for CI/CD parsing
#
# SECURITY NOTE:
#   - No credentials are stored here
#   - Vault password file reference is used (file itself is gitignored)
#   - host_key_checking is intentionally left enabled for production safety
# =============================================================================

[defaults]
# ---------------------------------------------------------------------------
# INVENTORY CONFIGURATION
# ---------------------------------------------------------------------------
# Default inventory points to production. Override with -i flag for staging:
#   ansible-playbook -i inventories/staging site.yml
inventory = inventories/production

# ---------------------------------------------------------------------------
# ROLES PATH
# ---------------------------------------------------------------------------
# Ansible will search these paths for roles in order.
# The 'roles/' directory contains all custom ZIA roles.
# The second path supports Ansible Galaxy installed roles.
roles_path = roles:~/.ansible/roles

# ---------------------------------------------------------------------------
# COLLECTIONS PATH
# ---------------------------------------------------------------------------
# Where Ansible Galaxy collections are installed.
# Run: ansible-galaxy collection install -r requirements.yml
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# ---------------------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------------------
# All playbook runs are logged for audit and troubleshooting purposes.
# In production, this log should be shipped to a SIEM (Splunk, ELK, etc.)
# Log rotation should be configured at the OS level (logrotate).
log_path = /var/log/ansible/zia-automation.log

# ---------------------------------------------------------------------------
# RETRY FILES
# ---------------------------------------------------------------------------
# When a playbook fails, Ansible creates a .retry file listing failed hosts.
# Store these in a dedicated directory to keep the project root clean.
retry_files_enabled = True
retry_files_save_path = .retry/

# ---------------------------------------------------------------------------
# FACT CACHING
# ---------------------------------------------------------------------------
# Cache gathered facts to avoid redundant API calls during large runs.
# For ZIA automation (API-based, not SSH), this primarily caches set_fact
# results and registered variables across plays within a run.
# 'jsonfile' backend is used for simplicity; Redis can be used for distributed runs.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 3600

# ---------------------------------------------------------------------------
# OUTPUT & DISPLAY
# ---------------------------------------------------------------------------
# Show diffs when --diff flag is used (critical for change management)
# This allows operators to see exactly what will change before applying.
display_skipped_hosts = False
display_args_to_stdout = False

# Use the 'yaml' stdout callback for cleaner, more readable output.
# The 'profile_tasks' callback shows timing per task (useful for optimization).
stdout_callback = yaml
callback_whitelist = profile_tasks, timer, mail

# ---------------------------------------------------------------------------
# PERFORMANCE TUNING
# ---------------------------------------------------------------------------
# Fork count: how many hosts to manage in parallel.
# For ZIA API calls, this controls concurrent API requests.
# Start conservative (10) and increase based on ZIA API rate limits.
forks = 10

# Pipelining reduces SSH operations (not directly applicable to ZIA API calls,
# but relevant if any tasks run on local/jump hosts).
pipelining = True

# ---------------------------------------------------------------------------
# TIMEOUT SETTINGS
# ---------------------------------------------------------------------------
# Connection timeout in seconds. ZIA API calls should complete within 30s.
# Increase if experiencing timeouts on slow network paths.
timeout = 30

# ---------------------------------------------------------------------------
# VAULT CONFIGURATION
# ---------------------------------------------------------------------------
# Reference to the vault password file. This file contains ONLY the password
# to decrypt ansible-vault encrypted files (NOT HashiCorp Vault credentials).
# The actual file is gitignored. In CI/CD, use ANSIBLE_VAULT_PASSWORD_FILE env var.
# vault_password_file = .vault_pass

# ---------------------------------------------------------------------------
# DEPRECATION WARNINGS
# ---------------------------------------------------------------------------
# Suppress deprecation warnings in production to reduce noise.
# Re-enable during upgrades to catch breaking changes.
deprecation_warnings = False

# ---------------------------------------------------------------------------
# ERROR HANDLING
# ---------------------------------------------------------------------------
# Do not continue with remaining hosts if a host fails.
# This is critical for ZIA automation to prevent partial state.
# Override with ANSIBLE_ANY_ERRORS_FATAL=false for debugging.
any_errors_fatal = False

# Show task arguments in output (useful for debugging, disable in prod for security)
# Override with -v flag when needed
show_custom_stats = True

# ---------------------------------------------------------------------------
# INTERPRETER DISCOVERY
# ---------------------------------------------------------------------------
# Use Python 3 explicitly. ZIA Ansible collection requires Python 3.8+
interpreter_python = auto_silent

[inventory]
# ---------------------------------------------------------------------------
# INVENTORY PLUGINS
# ---------------------------------------------------------------------------
# Enable these inventory plugins for dynamic inventory support.
# The 'yaml' plugin handles our static YAML inventory files.
# 'constructed' allows dynamic grouping based on variables.
enable_plugins = yaml, ini, auto, constructed

[ssh_connection]
# ---------------------------------------------------------------------------
# SSH CONNECTION SETTINGS
# ---------------------------------------------------------------------------
# These settings apply when Ansible connects to local/jump hosts.
# ZIA API calls are made from the Ansible control node, not via SSH to ZIA.
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
control_path_dir = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True

[persistent_connection]
# ---------------------------------------------------------------------------
# PERSISTENT CONNECTION SETTINGS
# ---------------------------------------------------------------------------
# Timeout for persistent connections (used by network modules)
connect_timeout = 30
command_timeout = 30
