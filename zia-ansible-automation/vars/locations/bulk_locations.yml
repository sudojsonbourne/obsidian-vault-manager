# =============================================================================
# vars/locations/bulk_locations.yml — Bulk Location Definitions
# =============================================================================
# PURPOSE:
#   This is the primary data file defining all ZIA locations to be managed.
#   It follows a data-driven approach where ALL location configuration is
#   expressed as structured YAML data, not procedural code.
#
# WHY DATA-DRIVEN?
#   - Adding a new location = adding a YAML block (no code changes)
#   - Locations can be reviewed in pull requests as data changes
#   - Bulk operations loop over this list automatically
#   - Consistent structure enforced by validation role
#   - Easy to generate from CMDB/IPAM exports (CSV → YAML conversion)
#
# SCALING TO 100+ LOCATIONS:
#   This file can contain hundreds of location definitions.
#   The location management role loops over 'zia_locations' list.
#   Performance: ~1-2 seconds per location API call.
#   For 100 locations: ~2-3 minutes total runtime.
#   For 500 locations: ~10-15 minutes (consider splitting into batches).
#
# FIELD REFERENCE:
#   name          (required) — Unique location name. Must match naming convention.
#   state         (required) — 'present' to create/update, 'absent' to delete
#   ip_addresses  (required) — List of egress IP addresses for this location
#   country       (required) — ISO 3166-1 alpha-2 country code
#   tz            (required) — IANA timezone string
#   profile       (optional) — CORPORATE, SERVER, GUESTWIFI, IOT, WORKLOAD
#   auth_required (optional) — Require user authentication (default: true)
#   ssl_scan_enabled (optional) — Enable SSL inspection (default: false)
#   surrogate_ip  (optional) — Enable surrogate IP (default: false)
#   xff_forward_enabled (optional) — Enable XFF forwarding (default: false)
#   up_bandwidth  (optional) — Upload bandwidth limit in Mbps (0=unlimited)
#   dn_bandwidth  (optional) — Download bandwidth limit in Mbps (0=unlimited)
#   description   (optional) — Human-readable description
#   vpn_credentials (optional) — VPN credential references for GRE/IPSec
#   sub_locations (optional) — List of sub-locations for this location
#
# GENERATING FROM CMDB:
#   Use the provided script to convert CSV exports to this format:
#   python3 scripts/csv_to_locations.py --input locations.csv --output vars/locations/bulk_locations.yml
#
# USAGE:
#   ansible-playbook onboard_locations.yml
#   ansible-playbook onboard_locations.yml --tags create
#   ansible-playbook onboard_locations.yml --check --diff  # dry-run
#
# EXAMPLE EXECUTION COMMANDS:
#   # Onboard all locations:
#   ansible-playbook -i inventories/production onboard_locations.yml
#
#   # Onboard only locations tagged 'us-east':
#   ansible-playbook -i inventories/production onboard_locations.yml \
#     --extra-vars "location_filter_tag=us-east"
#
#   # Dry-run to see what would change:
#   ansible-playbook -i inventories/production onboard_locations.yml \
#     --check --diff
#
#   # Delete a specific location (requires force=true):
#   ansible-playbook -i inventories/production onboard_locations.yml \
#     --extra-vars "force=true" --tags delete \
#     --extra-vars "target_location=NYC-HQ-01"
# =============================================================================

---
# =============================================================================
# ZIA LOCATIONS — COMPLETE DEFINITION LIST
# =============================================================================
# Each entry in this list represents one ZIA location.
# The location management role iterates over this list.
#
# IDEMPOTENCY NOTE:
#   The ZIA Ansible collection modules are idempotent by design.
#   Running this playbook multiple times will NOT create duplicate locations.
#   If a location already exists with the same name, it will be UPDATED
#   to match the definition below (if any fields differ).
# =============================================================================

zia_locations:

  # ===========================================================================
  # UNITED STATES — EAST COAST
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # New York — Headquarters
  # ---------------------------------------------------------------------------
  - name: "NYC-HQ-01"
    state: present
    description: "New York City Headquarters - Primary Office"
    country: "UNITED_STATES"
    tz: "US/Eastern"
    profile: "CORPORATE"
    auth_required: true
    ssl_scan_enabled: true          # HQ has SSL inspection enabled
    surrogate_ip: true              # Surrogate IP for user identity mapping
    xff_forward_enabled: false
    up_bandwidth: 0                 # Unlimited (HQ has dedicated fiber)
    dn_bandwidth: 0
    # Egress IP addresses for this location
    # These are the public IPs that ZIA will associate with this location
    ip_addresses:
      - "203.0.113.10"             # Primary egress IP (RFC 5737 example)
      - "203.0.113.11"             # Secondary egress IP (failover)
    # VPN credentials reference (for GRE tunnel authentication)
    # The actual credentials are stored in Vault
    # vpn_credentials:
    #   - id: "{{ zia_vpn_cred_nyc_hq_01 }}"
    tags:
      - us-east
      - headquarters
      - ssl-inspection

