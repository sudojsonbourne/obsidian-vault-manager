  #   secondary_dest_vip: "165.225.0.6"
  #   within_country: true
  #   ip_unnumbered: false           # Numbered tunnel
  #   internal_ip_range: "100.64.0.0/29"  # RFC 6598 shared address space
  #   country_code: "US"

