version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: netdiagram-postgres
    environment:
      POSTGRES_DB: netdiagram
      POSTGRES_USER: netdiagram
      POSTGRES_PASSWORD: netdiagram_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netdiagram"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdiagram-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: netdiagram
      DB_PASSWORD: netdiagram_pass
      DB_NAME: netdiagram
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netdiagram-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  uploads:
